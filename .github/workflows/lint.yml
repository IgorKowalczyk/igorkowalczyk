name: Lint

on: [push, pull_request]

jobs:
 lint:
  name: Lint
  runs-on: ubuntu-latest
  strategy:
   fail-fast: false
  steps:
   - name: 🧱 Checkout repository
     uses: actions/checkout@v7
   - name: 🔩 Setup Bun
     uses: oven-sh/setup-bun@v2
   - name: 📦 Install dependencies
     run: bun install
   - name: 🚀 Check formatting
     run: bun biome-check
